name: "Generate Release Badge"
run-name: "Generate Release Badge for ${{ github.event.release.tag_name || github.ref_name }}"

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Target Branch
        id: extract-branch
        env:
          RAW_TARGET: ${{ github.event.release.target_commitish }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [[ "$RAW_TARGET" =~ ^[0-9a-f]{40}$ ]] || [ -z "$RAW_TARGET" ]; then
            TARGET_BRANCH="$DEFAULT_BRANCH"
          else
            TARGET_BRANCH="$RAW_TARGET"
          fi
          echo "BRANCH_NAME=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Switch to Target Branch
        run: |
          TARGET="${{ steps.extract-branch.outputs.BRANCH_NAME }}"
          git checkout -B "$TARGET" "origin/$TARGET" 2>/dev/null || git checkout "$TARGET"

      - name: Generate SVG Badge via Pure Bash
        id: generate-badge
        env:
          RAW_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p assets/badges

          # Fallback per workflow_dispatch: se il tag dell'evento release è vuoto, usa l'ultimo tag Git disponibile
          TAG_VAL="$RAW_TAG_NAME"
          if [ -z "$TAG_VAL" ]; then
            TAG_VAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          fi
          echo "RESOLVED_TAG=$TAG_VAL" >> "$GITHUB_ENV"

          # 1. XML Escaping nativo in Bash
          SAFE_TAG="$TAG_VAL"
          SAFE_TAG="${SAFE_TAG//&/&amp;}"
          SAFE_TAG="${SAFE_TAG//</&lt;}"
          SAFE_TAG="${SAFE_TAG//>/&gt;}"
          SAFE_TAG="${SAFE_TAG//\"/&quot;}"
          SAFE_TAG="${SAFE_TAG//\'/&#39;}"

          # 2. Calcolo dinamico della larghezza badge
          TAG_LEN=${#TAG_VAL}
          CHAR_WIDTH=7
          VAL_WIDTH=$(( TAG_LEN * CHAR_WIDTH + 14 ))
          [ "$VAL_WIDTH" -lt 50 ] && VAL_WIDTH=50
          
          LABEL_WIDTH=55
          TOTAL_WIDTH=$(( LABEL_WIDTH + VAL_WIDTH ))
          LABEL_CENTER=275
          VAL_CENTER=$(( (LABEL_WIDTH * 10) + (VAL_WIDTH * 5) ))

          # 3. Generazione file SVG con corretta indentazione YAML
          cat <<EOF > assets/badges/release.svg
          <svg xmlns="http://www.w3.org/2000/svg" width="${TOTAL_WIDTH}" height="20" role="img" aria-label="version: ${SAFE_TAG}">
            <linearGradient id="b" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient>
            <clipPath id="r"><rect width="${TOTAL_WIDTH}" height="20" rx="3" fill="#fff"/></clipPath>
            <g clip-path="url(#r)">
              <rect width="${LABEL_WIDTH}" height="20" fill="#2B2B2B"/>
              <rect x="${LABEL_WIDTH}" width="${VAL_WIDTH}" height="20" fill="#4EAA25"/>
              <rect width="${TOTAL_WIDTH}" height="20" fill="url(#b)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
              <text x="${LABEL_CENTER}" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)">version</text>
              <text x="${LABEL_CENTER}" y="140" transform="scale(.1)" fill="#fff">version</text>
              <text x="${VAL_CENTER}" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)">${SAFE_TAG}</text>
              <text x="${VAL_CENTER}" y="140" transform="scale(.1)" fill="#fff">${SAFE_TAG}</text>
            </g>
          </svg>
          EOF

      - name: Commit and Push Badge
        env:
          TARGET_BRANCH: ${{ steps.extract-branch.outputs.BRANCH_NAME }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add assets/badges/release.svg
          
          if ! git diff --cached --quiet; then
            git commit -m "chore(ci): update release badge to ${RESOLVED_TAG} [skip ci]"
            git pull --rebase --autostash origin "$TARGET_BRANCH"
            git push origin "$TARGET_BRANCH"
          else
            echo "Nessuna modifica al badge richiesta."
          fi

- name: Run smoke test
        shell: bash
        run: |
          set -euo pipefail

          if [ -x "./bin/bash4llm" ]; then
            GROQ_BIN="./bin/bash4llm"
          else
            echo "FAIL: bash4llm non trovato"
            exit 2
          fi

          export HOME="/home/runner"
          export TMPDIR="${TMPDIR:-${RUNNER_TEMP:-/tmp}}"
          export TMP="$TMPDIR"
          export TEMP="$TMPDIR"
          export XDG_CONFIG_HOME="${HOME}/.config"

          echo "=== DEBUG BASH4LLM DIAGNOSTICS ==="
          "$GROQ_BIN" --diagnostics || true
          echo "=================================="

          OUTFILE="$(mktemp)"
          set +e
          "$GROQ_BIN" --dry-run tests/good.json >"$OUTFILE" 2>&1
          RC=$?
          set -e

          echo "Exit code: $RC"
          echo "Output:"
          sed -n '1,200p' "$OUTFILE"

          if [ $RC -ne 0 ]; then
            echo "FAIL: dry-run exit $RC"
            exit 1
          fi

          echo "OK: --dry-run completato con exit code 0"

name: Cross-Platform Matrix

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-linux-macos:
    name: Test su ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Installazione dipendenze (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bash coreutils findutils util-linux gawk curl jq

      - name: Installazione dipendenze (macOS via Homebrew)
        if: runner.os == 'macOS'
        run: |
          brew install bash coreutils findutils util-linux gawk curl jq
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

      - name: Prepariamo le cartelle e la whitelist dei modelli
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.config/bash4llm/groq"
          mkdir -p "$HOME/.config/groq"
          mkdir -p ./bin/bash4llm.d/models
          mkdir -p ./bash4llm.d/models
          echo "llama-3.3-70b-versatile" > "$HOME/.config/bash4llm/groq/models.txt"
          echo "llama-3.3-70b-versatile" > "$HOME/.config/groq/models.txt"
          echo "llama-3.3-70b-versatile" > ./bin/bash4llm.d/models/models.txt
          echo "llama-3.3-70b-versatile" > ./bash4llm.d/models/models.txt

      - name: Esecuzione Smoke Test / Dry-Run
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'dummy_key_for_dry_run' }}
        run: |
          chmod +x bin/bash4llm
          ./bin/bash4llm --dry-run tests/good.json

  test-windows-wsl:
    name: Test su Windows (WSL)
    runs-on: windows-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Installazione ed avvio WSL Ubuntu
        shell: powershell
        run: |
          wsl --install -d Ubuntu --no-launch
          wsl --set-default Ubuntu

      - name: Esecuzione Test dentro WSL
        shell: powershell
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'dummy_key_for_dry_run' }}
        run: |
          wsl -u root -- exec bash -c "set -euo pipefail; apt-get update && apt-get install -y bash coreutils findutils util-linux gawk curl jq && mkdir -p /root/.config/bash4llm/groq /root/.config/groq ./bin/bash4llm.d/models ./bash4llm.d/models && echo 'llama-3.3-70b-versatile' > /root/.config/bash4llm/groq/models.txt && echo 'llama-3.3-70b-versatile' > /root/.config/groq/models.txt && echo 'llama-3.3-70b-versatile' > ./bin/bash4llm.d/models/models.txt && echo 'llama-3.3-70b-versatile' > ./bash4llm.d/models/models.txt && chmod +x bin/bash4llm && ./bin/bash4llm --dry-run tests/good.json"

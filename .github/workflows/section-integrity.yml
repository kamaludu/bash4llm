name: Section Marker Integrity Audit

on:
  push:
    branches: [ main ]
    paths:
      - 'bash4llm' # Triggera SOLO se il file bash4llm è stato modificato
  pull_request:
    branches: [ main ]
    paths:
      - 'bash4llm'
  workflow_dispatch: # Consentito l'avvio manuale da GitHub UI

jobs:
  audit-sections:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Macro-Sections and Section Tag Symmetry
        run: |
          bash -c '
            set -e
            echo "Checking Section Markers strictly on bash4llm..."
            
            open_tags=$(grep -oE "#--[0-9]+<---\[ SECTION: [A-Z0-9_]+ \]" bash4llm | sort)
            close_tags=$(grep -oE "#--[0-9]+<---\[ /SECTION: [A-Z0-9_]+ \]" bash4llm | sed "s#SECTION: /#SECTION: #" | sort)
            
            if [ "$open_tags" != "$close_tags" ]; then
              echo "❌ ERROR: Mismatch between opening and closing Section tags!"
              diff -u <(echo "$open_tags") <(echo "$close_tags")
              exit 1
            fi

            if grep -qE "#--[0-9]+\.[0-9]+" bash4llm; then
              echo "❌ ERROR: Subsections ($N.X) detected! Architectural violation of Flat Policy."
              grep -nE "#--[0-9]+\.[0-9]+" bash4llm
              exit 1
            fi
            
            echo "✅ Section Marker Architecture on bash4llm is 100% Valid!"
          '

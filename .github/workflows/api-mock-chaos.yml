name: API Chaos & Resilience Mock Suite

on:
  push:
    branches: [ main ]
    paths:
      - 'bash4llm'
      - '.github/workflows/api-mock-chaos.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'bash4llm'
      - '.github/workflows/api-mock-chaos.yml'
  workflow_dispatch:

jobs:
  mock-chaos-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Resilient Mock Server & Run Fault Injection
        run: |
          set -euo pipefail
          
          # Dynamic Path Detection
          B4L_BIN="./bash4llm"
          if [ ! -f "$B4L_BIN" ]; then
            B4L_BIN=$(find . -maxdepth 2 -name "bash4llm" -type f | head -n 1 || true)
          fi

          if [ -z "$B4L_BIN" ] || [ ! -f "$B4L_BIN" ]; then
            echo "❌ ERROR: Executable file '\''bash4llm'\'' not found in repository!"
            exit 1
          fi

          chmod +x "$B4L_BIN"

          # Pre-create local model whitelist to ensure resolve_model succeeds
          mkdir -p bash4llm.d/models
          echo "llama-3.3-70b-versatile" > bash4llm.d/models/groq.txt

          # 1. Start Python Mock HTTP Server with Reusable Socket and Content-Length Headers
          python3 -c '
          import http.server, socketserver
          class MockHandler(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  body = b"{\"data\":[{\"id\":\"llama-3.3-70b-versatile\"}]}"
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)
              def do_POST(self):
                  if "empty" in self.path:
                      body = b"{\"choices\":[{\"message\":{\"content\":\"\"},\"finish_reason\":\"stop\"}],\"usage\":{\"completion_tokens\":0}}"
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)
                  elif "error500" in self.path:
                      body = b"{\"error\":{\"message\":\"Internal Server Error\"}}"
                      self.send_response(500)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)
                  else:
                      body = b"{\"error\":{\"message\":\"Bad Request\"}}"
                      self.send_response(400)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)
              def log_message(self, format, *args): return

          class ReusableTCPServer(socketserver.TCPServer):
              allow_reuse_address = True

          with ReusableTCPServer(("127.0.0.1", 18080), MockHandler) as httpd:
              httpd.serve_forever()
          ' &
          SERVER_PID=$!

          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          # 2. Active Socket Polling
          echo "Waiting for Mock Server on port 18080..."
          READY=0
          for i in {1..30}; do
            if python3 -c 'import socket; s = socket.socket(); s.connect(("127.0.0.1", 18080)); s.close()' 2>/dev/null; then
              READY=1
              break
            fi
            sleep 0.1
          done

          if [ "$READY" -ne 1 ]; then
            echo "❌ ERROR: Mock server failed to bind port 18080!"
            exit 1
          fi

          export GROQ_API_KEY="gsk_mock_key_test_12345"

          # 3. Test Empty Completion Edge Case Handling (Expects Error Code 16)
          export BASH4LLM_API_URL="http://127.0.0.1:18080/empty"
          set +e
          "$B4L_BIN" "Test prompt"
          rc=$?
          set -e
          if [ "$rc" -ne 16 ]; then
            echo "❌ ERROR: Expected API error code 16 on empty completion, got $rc"
            exit 1
          fi
          echo "✅ Edge Case Empty Completion handled correctly with code 16!"

          # 4. Test HTTP 500 API Error Handling (Expects Error Code 16)
          export BASH4LLM_API_URL="http://127.0.0.1:18080/error500"
          set +e
          "$B4L_BIN" "Test prompt"
          rc=$?
          set -e
          if [ "$rc" -ne 16 ]; then
            echo "❌ ERROR: Expected API error code 16 on HTTP 500, got $rc"
            exit 1
          fi
          echo "✅ HTTP 500 Error handled correctly with code 16!"

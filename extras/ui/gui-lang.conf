# gui-lang.conf (optimized)
# Format:
#   KEY[.lang]=value
# If KEY.lang exists it is used for that language.
# Otherwise KEY (global) is used as fallback.
# Default language: en
#
# Supported language codes: en (English), it (Italiano), es (Español), fr (Français), de (Deutsch)
# Use global entries for values identical across all languages to avoid duplication.

# --- Meta / defaults ---
DEFAULT_LANG=en

# --- Language display names (can be used to build LANG_OPTIONS) ---
LANG_NAME.en=English
LANG_NAME.it=Italiano
LANG_NAME.es=Español
LANG_NAME.fr=Français
LANG_NAME.de=Deutsch


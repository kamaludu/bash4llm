<!-- extras/ui/templates/settings-content.html -->
<section class="settings-block">

  <!-- Step 1, 2, 3: Configure Provider & API Key -->
  <div class="form-section">
    <h2>1, 2, 3: {{TXT_PROVIDER}} &amp; {{TXT_API_KEY}}</h2>
    <form method="post" action="?page=settings&amp;lang={{LANG_CODE}}">
      <input type="hidden" name="action" value="save_api">
      
      <label for="provider-select">1. {{TXT_SELECT}} {{TXT_PROVIDER}}</label>
      <select id="provider-select" name="provider">
        {{PROVIDER_OPTIONS}}
      </select>

      <label for="api_key">2. {{TXT_API_KEY}}</label>
      <!-- Secured: type="password" attribute strictly validated for sensitive input -->
      <input type="password" id="api_key" name="api_key" autocomplete="new-password" value="{{API_KEY_FIELD}}">
      {{API_KEY_WARNING_HTML}}

      <div class="form-actions">
        <button type="submit">3. {{TXT_SAVE}}</button>
      </div>
    </form>
  </div>

  <!-- Step 4 & 5: Fetch & List Supported Models -->
  <div class="form-section">
    <h2>4, 5: {{TXT_REFRESH_MODELS}}</h2>
    <form method="post" action="?page=settings&amp;lang={{LANG_CODE}}">
      <input type="hidden" name="action" value="refresh_models">
      <input type="hidden" name="provider" value="{{PROVIDER_CURRENT}}">
      <p class="section-desc">4. {{TXT_REFRESH_MODELS}} ({{PROVIDER_CURRENT}})</p>
      <div class="form-actions">
        <button type="submit" {{REFRESH_DISABLED_ATTR}}>4. {{TXT_REFRESH}}</button>
      </div>
    </form>
  </div>

  <!-- Step 6: Select and Set Default Model -->
  <div class="form-section">
    <h2>6: {{TXT_SET_MODEL}}</h2>
    <form method="post" action="?page=settings&amp;lang={{LANG_CODE}}">
      <input type="hidden" name="action" value="set_model">
      <input type="hidden" name="provider" value="{{PROVIDER_CURRENT}}">
      
      <label for="model-select">6. {{TXT_SELECT}} {{TXT_MODEL}} ({{PROVIDER_CURRENT}})</label>
      <select id="model-select" name="model" size="5" required {{MODEL_SELECT_DISABLED_ATTR}}>
        {{MODEL_SELECT_OPTIONS}}
      </select>

      <div class="form-actions">
        <button type="submit" {{MODEL_SELECT_DISABLED_ATTR}}>6. {{TXT_SAVE}}</button>
      </div>
    </form>
  </div>

  <!-- Contextual Conversation Settings -->
  <div class="form-section">
    <h2>{{TXT_SESSION}} &amp; {{TXT_MEMORY}}</h2>
    <form method="post" action="?page=settings&amp;lang={{LANG_CODE}}">
      <input type="hidden" name="action" value="save_memory">

      <label for="use-sessions-select">{{TXT_USE_SESSIONS}}</label>
      <select id="use-sessions-select" name="use_sessions">
        <option value="enabled" {{USE_SESSIONS_enabled}}>{{TXT_SESSIONS_ENABLED}}</option>
        <option value="disabled" {{USE_SESSIONS_disabled}}>{{TXT_SESSIONS_DISABLED}}</option>
      </select>

      <label for="session-window-input">1-20</label>
      <input type="number" id="session-window-input" name="session_window" min="1" max="20" value="{{SESSION_WINDOW_VALUE}}" required>

      <div class="form-actions">
        <button type="submit">{{TXT_SAVE}}</button>
      </div>
    </form>
  </div>

</section>

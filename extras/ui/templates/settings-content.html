<!-- extras/ui/templates/settings-content.html -->
<section class="settings-block">

  <!-- FORM 1: provider + refresh (invia solo provider e action=refresh_models) -->
  <form method="post" action="?page=settings&lang={{LANG_CODE}}">
    <h2>{{TXT_PROVIDER}}</h2>
    <select name="provider">
      {{PROVIDER_OPTIONS}}
    </select>
    <button type="submit" name="action" value="refresh_models">{{TXT_REFRESH}}</button>
  </form>

  <!-- FORM 2: API key, modelli, lingua, tema, salvataggio generale -->
  <form method="post" action="?page=settings&lang={{LANG_CODE}}">
    <h2>{{TXT_API_KEY}}</h2>
    <input type="password" name="api_key" autocomplete="new-password" value="{{API_KEY_FIELD}}">

    <h2>{{TXT_MODEL}}</h2>
    <select name="model" size="5" required>
        {{MODEL_SELECT_OPTIONS}}
    </select>
    <button type="submit" name="action" value="set_model">{{TXT_SET_MODEL}}</button>
  </form>

</section>

<section class="settings-block">
  <form method="post" action="?page=settings&lang={{LANG_CODE}}">

    <h2>{{TXT_PROVIDER}}</h2>
    <input type="text" name="provider" value="{{PROVIDER_CURRENT}}">

    <h2>{{TXT_API_KEY}}</h2>
    <input type="password" name="api_key" value="">

    <h2>{{TXT_MODEL}}</h2>
    <input type="text" name="model" value="{{MODEL_CURRENT}}">

    <h2>{{TXT_REFRESH_MODELS}}</h2>
    <button type="submit" name="action" value="refresh_models">
      {{TXT_REFRESH}}
    </button>

    <h2>{{TXT_LANGUAGE}}</h2>
    <select name="lang">
      {{LANG_OPTIONS}}
    </select>

    <h2>{{TXT_THEME}}</h2>
    <select name="theme">
      <option value="light" {{THEME_IS_light}}>{{TXT_THEME_LIGHT}}</option>
      <option value="dark" {{THEME_IS_dark}}>{{TXT_THEME_DARK}}</option>
    </select>

    <br><br>
    <button type="submit">{{TXT_SAVE}}</button>
  </form>
</section>

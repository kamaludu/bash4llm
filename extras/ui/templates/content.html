<!-- extras/ui/templates/content.html -->
<div class="content-wrapper">
  
  <section class="conversation-current">
    <h2>{{TXT_CURRENT_CONVERSATION}} — {{html_current_title}}</h2>
    <div class="chat-viewport">
      {{CURRENT_CONV}}
      {{PENDING_STATUS_HTML}}
    </div>
  </section>

  <section class="prompt-input">
    <h2>{{TXT_SEND_PROMPT}}</h2>
    <form method="post" action="?page=main&lang={{LANG_CODE}}">
      <label for="prompt">{{TXT_PROMPT}}</label>
      <textarea id="prompt" name="prompt" rows="4" cols="60" placeholder="Type your message here..."></textarea>
      
      <div class="active-info-container">
        <div class="active-info-box">
          <span>Active Provider:</span>
          <strong>{{PROVIDER_CURRENT}}</strong>
        </div>
        <div class="active-info-box">
          <span>Active Model:</span>
          <strong>{{MODEL_CURRENT}}</strong>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" {{SUBMIT_DISABLED_ATTR}}>{{TXT_SEND}}</button>
      </div>
    </form>
  </section>

  <section class="conversation-list">
    <div class="conversation-list-header">
      <h2>{{TXT_CONVERSATIONS}}</h2>
      <a href="?page=newconv&lang={{LANG_CODE}}" class="btn-success">➕ {{TXT_NEW_CONVERSATION}}</a>
    </div>
    <div class="conv-list-container">
      {{CONV_LIST}}
    </div>
  </section>
  
</div>

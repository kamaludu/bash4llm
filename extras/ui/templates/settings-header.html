<!-- extras/ui/templates/settings-header.html -->

<!DOCTYPE html>
<html lang="{{LANG_CODE}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TXT_SETTINGS}}</title>
  <link rel="stylesheet" href="/bash4llm-gui/static/gui-style-{{THEME}}.css">
</head>

<body>
<header class="topbar">
  <nav>
    <a href="?page=main&lang={{LANG_CODE}}{{TENANT_QUERY_VAR}}"><span class="glogo">Bash4LLM⁺</span><span class="uilogo">GUI</span> &nbsp; {{TXT_HOME}}</a> |
    <a href="?page=settings&lang={{LANG_CODE}}{{TENANT_QUERY_VAR}}">{{TXT_SETTINGS}}</a>
  </nav>
  <div class="lang-theme">
    <form method="get" action="">
      {{TENANT_INPUT_HTML}}
      <label for="lang-select" class="sr-only">{{TXT_LANGUAGE}}</label>
      <select id="lang-select" name="lang">
        {{LANG_OPTIONS}}
      </select>
      
      <label for="theme-select" class="sr-only">{{TXT_THEME}}</label>
      <select id="theme-select" name="theme">
        <option value="light" {{THEME_IS_light}}>{{TXT_THEME_LIGHT}}</option>
        <option value="dark" {{THEME_IS_dark}}>{{TXT_THEME_DARK}}</option>
      </select>
      
      <input type="hidden" name="page" value="settings">
      <button type="submit">{{TXT_APPLY}}</button>
    </form>
  </div>
</header>

<main>
<h1>{{TXT_SETTINGS}}</h1>

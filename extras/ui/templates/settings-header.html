<!DOCTYPE html>
<html lang="{{LANG_CODE}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{TXT_SETTINGS}} - GroqBash GUI</title>
  <link rel="stylesheet" href="/extras/ui/gui-style-{{THEME}}.css">
</head>
<body class="theme-{{THEME}}">
<header class="ui-header">
  <div class="ui-header-inner">
    <div class="ui-brand">
      <strong>GroqBash GUI</strong>
    </div>

    <nav class="ui-nav" role="navigation" aria-label="{{TXT_NAV}}">
      <a class="ui-link" href="?page=main&theme={{THEME}}&lang={{LANG_CODE}}">{{TXT_CONVERSATION}}</a>
      <a class="ui-link" href="?page=settings&theme={{THEME}}&lang={{LANG_CODE}}">{{TXT_SETTINGS}}</a>
    </nav>

    <form class="ui-controls" method="GET" action="?">
      <input type="hidden" name="page" value="settings">
      <label class="sr-only" for="theme-select-settings">{{TXT_THEME}}</label>
      <select id="theme-select-settings" name="theme" onchange="this.form.submit()" aria-label="{{TXT_THEME}}">
        <option value="light" {{THEME_IS_light}}>{{TXT_THEME_LIGHT}}</option>
        <option value="dark"  {{THEME_IS_dark}}>{{TXT_THEME_DARK}}</option>
      </select>

      <label class="sr-only" for="lang-select-settings">{{TXT_LANGUAGE}}</label>
      <select id="lang-select-settings" name="lang" onchange="this.form.submit()" aria-label="{{TXT_LANGUAGE}}">
        {{LANG_OPTIONS}}
      </select>

      <button class="btn" type="submit">{{TXT_REFRESH}}</button>
    </form>
  </div>
</header>

<main class="ui-main" role="main">
<h2>{{TXT_SETTINGS}}</h2>

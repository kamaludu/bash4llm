cmd_help_title=Available TUI Commands:
help_line_help=/help, /?            - Show this help message
help_line_exit=/exit, /quit          - Exit the interactive session
help_line_clear=/clear               - Clear the terminal screen
help_line_reset=/reset-session       - Reset active session history (clears disk files)
help_line_history=/history [n]        - Show session history (last n turns or -all)
help_line_config=/config             - Open active provider/model configuration menu
help_line_menu=/menu                 - Open session management and tools menu
help_line_undo=/undo                 - Undo last conversation turn (User + Assistant)
help_line_status=/status             - Show current configuration, model, and system prompt status
help_line_system=/system [prompt]    - Display or set a new system prompt
help_line_model=/model [name]        - Dynamically switch active LLM for current session
help_line_file=/file <path> [prompt] - Append text file content to your prompt
help_line_block=/block               - Start multi-line block input (end with /end on new line)
help_line_edit=/edit                 - Compose prompt using system default text editor
cmd_help_shortcuts_title=Keyboard Shortcuts (Readline):
help_sc_d=Ctrl + D                   - Exit TUI (sends EOF)
help_sc_c=Ctrl + C                   - Interrupt generation or clear current line
help_sc_l=Ctrl + L                   - Clear terminal while keeping state (same as /clear)
help_sc_ae=Ctrl + A / Ctrl + E       - Move cursor to beginning or end of line
help_sc_uk=Ctrl + U / Ctrl + K       - Delete line from cursor to beginning or end

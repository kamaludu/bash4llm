cmd_help_title=Comandi TUI Disponibili:
help_line_help=/help, /?            - Mostra questo messaggio di aiuto
help_line_exit=/exit, /quit          - Esci dalla sessione interattiva
help_line_clear=/clear               - Pulisce la schermata del terminale
help_line_reset=/reset-session       - Azzera la cronologia della sessione corrente
help_line_history=/history [n]        - Mostra la cronologia della sessione (ultimi n messaggi o -all)
help_line_config=/config             - Apre il menu di configurazione del provider/modello
help_line_menu=/menu                 - Apre il menu di gestione delle sessioni e dei tool
help_line_undo=/undo                 - Rimuove l'ultimo turno di conversazione (User + Assistant)
help_line_status=/status             - Mostra lo stato corrente di sessione, modello e prompt di sistema
help_line_system=/system [prompt]    - Visualizza o imposta un nuovo prompt di sistema
help_line_model=/model [nome]        - Cambia dinamicamente il modello attivo per la sessione
help_line_file=/file <path> [prompt] - Allega il contenuto di un file di testo al prompt
help_line_block=/block               - Avvia una modalità di inserimento multi-riga (termina con /end)
help_line_edit=/edit                 - Scrive il prompt usando l'editor di testo predefinito di sistema
cmd_help_shortcuts_title=Scorciatoie da Tastiera (Readline):
help_sc_d=Ctrl + D                   - Esci dalla TUI (invia EOF)
help_sc_c=Ctrl + C                   - Interrompi la generazione in corso o cancella la riga corrente
help_sc_l=Ctrl + L                   - Pulisce lo schermo mantenendo lo stato (equivalente a /clear)
help_sc_ae=Ctrl + A / Ctrl + E       - Sposta il cursore all'inizio o alla fine della riga
help_sc_uk=Ctrl + U / Ctrl + K       - Cancella il testo dal cursore a inizio o fine riga

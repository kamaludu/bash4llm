cmd_help_title=Verfügbare TUI-Befehle:
help_line_help=/help, /?            - Zeigt diese Hilfenachricht an
help_line_exit=/exit, /quit          - Beendet die interaktive Sitzung
help_line_clear=/clear               - Leert den Terminalbildschirm
help_line_reset=/reset-session       - Setzt den Verlauf der aktiven Sitzung zurück
help_line_history=/history [n]        - Zeigt den Verlauf an (letzte n Runden oder -all)
help_line_config=/config             - Öffnet das Konfigurationsmenü für Anbieter/Modell
help_line_menu=/menu                 - Öffnet das Menü für Sitzungsverwaltung und Tools
help_line_undo=/undo                 - Letzte Konversationsrunde rückgängig machen (User + Assistant)
help_line_status=/status             - Zeigt aktuelle Konfiguration, Modell und System-Prompt an
help_line_system=/system [prompt]    - System-Prompt anzeigen oder neu setzen
help_line_model=/model [name]        - Wechselt dynamisch das aktive LLM-Modell
help_line_file=/file <pfad> [prompt]  - Hängt den Inhalt einer Textdatei an Ihren Prompt an
help_line_block=/block               - Startet mehrzeilige Eingabe (beenden mit /end)
help_line_edit=/edit                 - Schreibt den Prompt mit dem Standard-Texteditor des Systems
cmd_help_shortcuts_title=Tastaturkurzbefehle (Readline):
help_sc_d=Ctrl + D                   - TUI beenden (sendet EOF)
help_sc_c=Ctrl + C                   - Generierung abbrechen oder aktuelle Zeile löschen
help_sc_l=Ctrl + L                   - Bildschirm leeren und Zustand beibehalten (wie /clear)
help_sc_ae=Ctrl + A / Ctrl + E       - Cursor an den Anfang oder das Ende der Zeile bewegen
help_sc_uk=Ctrl + U / Ctrl + K       - Text vom Cursor zum Anfang oder Ende löschen

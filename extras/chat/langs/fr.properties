cmd_help_title=Commandes TUI Disponibles:
help_line_help=/help, /?            - Afficher ce message d'aide
help_line_exit=/exit, /quit          - Quitter la session interactive
help_line_clear=/clear               - Effacer l'écran du terminal
help_line_reset=/reset-session       - Réinitialiser l'historique de la session active
help_line_history=/history [n]        - Afficher l'historique de la session (n derniers messages ou -all)
help_line_config=/config             - Ouvrir le menu de configuration du fournisseur/modèle
help_line_menu=/menu                 - Ouvrir le menu de gestion de session et d'outils
help_line_undo=/undo                 - Annuler le dernier tour de conversation (User + Assistant)
help_line_status=/status             - Afficher la configuration actuelle, le modèle et le prompt système
help_line_system=/system [prompt]    - Afficher ou définir un nouveau prompt système
help_line_model=/model [nom]         - Changer dynamiquement de modèle LLM actif
help_line_file=/file <chemin> [prompt] - Joindre le contenu d'un fichier texte au prompt
help_line_block=/block               - Saisie multi-lignes (terminer par /end sur une nouvelle ligne)
help_line_edit=/edit                 - Rédiger le prompt avec l'éditeur de texte par défaut
cmd_help_shortcuts_title=Raccourcis Clavier (Readline):
help_sc_d=Ctrl + D                   - Quitter la TUI (envoie EOF)
help_sc_c=Ctrl + C                   - Interrompre la génération ou effacer la ligne actuelle
help_sc_l=Ctrl + L                   - Effacer l'écran tout en conservant l'état (comme /clear)
help_sc_ae=Ctrl + A / Ctrl + E       - Déplacer le curseur au début ou à la fin de la ligne
help_sc_uk=Ctrl + U / Ctrl + K       - Effacer le texte du curseur au début ou à la fin

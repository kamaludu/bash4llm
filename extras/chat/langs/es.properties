cmd_help_title=Comandos TUI Disponibles:
help_line_help=/help, /?            - Muestra este mensaje de ayuda
help_line_exit=/exit, /quit          - Salir de la sesión interactiva
help_line_clear=/clear               - Limpiar la pantalla del terminal
help_line_reset=/reset-session       - Borrar el historial de la sesión activa
help_line_history=/history [n]        - Mostrar historial (últimos n turnos o -all)
help_line_config=/config             - Abrir menú de configuración de proveedor/modelo
help_line_menu=/menu                 - Abrir menú de gestión de sesiones y utilidades
help_line_undo=/undo                 - Deshacer último turno de conversación (User + Assistant)
help_line_status=/status             - Mostrar configuración actual, modelo y prompt de sistema
help_line_system=/system [prompt]    - Mostrar o establecer nuevo prompt de sistema
help_line_model=/model [nombre]      - Cambiar dinámicamente el modelo LLM activo
help_line_file=/file <ruta> [prompt] - Adjuntar el contenido de un archivo de texto
help_line_block=/block               - Iniciar entrada multilínea (finalizar con /end)
help_line_edit=/edit                 - Redactar el prompt usando el editor de texto predeterminado
cmd_help_shortcuts_title=Atajos de Teclado (Readline):
help_sc_d=Ctrl + D                   - Salir de la TUI (envía EOF)
help_sc_c=Ctrl + C                   - Interrumpir generación o borrar línea actual
help_sc_l=Ctrl + L                   - Limpiar pantalla manteniendo estado (como /clear)
help_sc_ae=Ctrl + A / Ctrl + E       - Mover cursor al inicio o al final de la línea
help_sc_uk=Ctrl + U / Ctrl + K       - Borrar texto desde el cursor al inicio o final
